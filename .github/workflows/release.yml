name: Release

# Release on every push to master (continuous delivery).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  # Gate + compute version + generate bilingual release notes + create the release.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for changelog generation

      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }

      - run: flutter pub get
      - name: Analyze (gate)
        run: flutter analyze
      - name: Test (gate)
        run: flutter test

      - name: Compute version
        id: meta
        run: |
          DATE=$(date -u +%Y.%m.%d)
          VERSION="${DATE}.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate bilingual release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..HEAD"; else RANGE="HEAD"; fi
          section() { # $1=prefix  $2=EN heading  $3=CN heading
            local items
            items=$(git log $RANGE --no-merges --pretty='%s' \
              | grep -E "^$1(\(.+\))?(!)?: " \
              | sed -E "s/^$1(\(.+\))?(!)?: //" | sed 's/^/- /')
            if [ -n "$items" ]; then printf '### %s / %s\n%s\n\n' "$2" "$3" "$items"; fi
          }
          {
            printf '> Auto-generated from commits since `%s`. / 由 `%s` 以来的提交自动生成。\n\n' "${PREV_TAG:-initial}" "${PREV_TAG:-initial}"
            section feat     "✨ Features"      "新功能"
            section fix      "🐛 Fixes"         "修复"
            section perf     "⚡ Performance"   "性能"
            section refactor "♻️ Refactor"      "重构"
            section docs     "📝 Docs"          "文档"
            section ci       "👷 CI / Build"    "构建 / CI"
            section chore    "🔧 Chores"        "杂项"
            other=$(git log $RANGE --no-merges --pretty='%s' \
              | grep -Ev "^(feat|fix|perf|refactor|docs|ci|chore)(\(.+\))?(!)?: " | sed 's/^/- /')
            if [ -n "$other" ]; then printf '### 🔖 Other / 其它\n%s\n\n' "$other"; fi
            printf -- '---\n📦 Downloads are split by platform & CPU architecture. / 下方产物按平台与 CPU 架构拆分。\n\n'
            printf '| Platform | Arch | Asset |\n|---|---|---|\n'
            printf '| Windows | x64 (runs on ARM64 via emulation) | `otp_migrator-windows-x64.zip` |\n'
            printf '| macOS | universal (arm64+x64) | `otp_migrator-macos-universal.zip` |\n'
            printf '| Linux | x64 | `otp_migrator-linux-x64.tar.gz` |\n'
            printf '| Linux | arm64 | `otp_migrator-linux-arm64.tar.gz` |\n'
            printf '| Android | arm64-v8a | `otp_migrator-android-arm64-v8a.apk` |\n'
            printf '| Android | armeabi-v7a | `otp_migrator-android-armeabi-v7a.apk` |\n'
            printf '| Android | x86_64 | `otp_migrator-android-x86_64.apk` |\n'
            printf '| Android | universal | `otp_migrator-android-universal.apk` |\n'
            printf '| Web | any | `otp_migrator-web.zip` |\n'
          } > notes.md
          echo "----- notes.md -----"; cat notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file notes.md \
            --target "$GITHUB_SHA"

  android:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }
      - run: flutter pub get
      - name: Build universal + per-ABI APKs
        run: |
          flutter build apk --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/otp_migrator-android-universal.apk"
          flutter build apk --release --split-per-abi --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
          cd build/app/outputs/flutter-apk
          for abi in arm64-v8a armeabi-v7a x86_64; do
            [ -f "app-${abi}-release.apk" ] && cp "app-${abi}-release.apk" "$GITHUB_WORKSPACE/otp_migrator-android-${abi}.apk"
          done
      - run: gh release upload "$TAG" otp_migrator-android-*.apk --clobber

  web:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build web --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
      - run: cd build/web && zip -rq "$GITHUB_WORKSPACE/otp_migrator-web.zip" .
      - run: gh release upload "$TAG" otp_migrator-web.zip --clobber

  linux-x64:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build linux --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
      - run: cd build/linux/x64/release/bundle && tar -czf "$GITHUB_WORKSPACE/otp_migrator-linux-x64.tar.gz" .
      - run: gh release upload "$TAG" otp_migrator-linux-x64.tar.gz --clobber

  linux-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    # subosito/flutter-action has no arm64 Linux SDK; bootstrap Flutter from git
    # (its Dart SDK self-provisions for aarch64). Best-effort.
    continue-on-error: true
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config curl git unzip xz-utils liblzma-dev
      - name: Set up Flutter (git clone, arm64-capable)
        run: |
          git clone --depth 1 -b 3.41.6 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
      - run: flutter --version
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
      - run: cd build/linux/arm64/release/bundle && tar -czf "$GITHUB_WORKSPACE/otp_migrator-linux-arm64.tar.gz" .
      - run: gh release upload "$TAG" otp_migrator-linux-arm64.tar.gz --clobber

  windows-x64:
    needs: prepare
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build windows --release --build-name "$env:VERSION" --build-number "$env:GITHUB_RUN_NUMBER"
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath otp_migrator-windows-x64.zip
      - run: gh release upload "$env:TAG" otp_migrator-windows-x64.zip --clobber

  # NOTE: No windows-arm64 job. Flutter stable does not target Windows ARM64
  # (the SDK/toolchain is x64-only). Windows 11 on ARM runs the x64 build via
  # built-in x64 emulation, so otp_migrator-windows-x64.zip covers ARM64 too.

  macos:
    needs: prepare
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.41.6", channel: stable, cache: true }
      - run: flutter pub get
      # macOS builds a universal binary (arm64 + x86_64) — covers both Apple Silicon and Intel.
      - run: flutter build macos --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"
      - run: cd build/macos/Build/Products/Release && zip -rq "$GITHUB_WORKSPACE/otp_migrator-macos-universal.zip" otp_migrator.app
      - run: gh release upload "$TAG" otp_migrator-macos-universal.zip --clobber
